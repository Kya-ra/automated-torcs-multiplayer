image: python:latest

stages:
  - check

python_check:
  stage: check
  tags:
    - docker
  script:
    # Show versions (useful when things go wrong)
    - python --version
    - pip --version

    # Install linting tool
    - pip install ruff

    # 1️⃣ Syntax check: fail on broken Python anywhere
    - python -m compileall .

    # 2️⃣ Linting: basic sanity, not strict
    - ruff check .

    # 3️⃣ Optional "run-ish" check: can the project be imported?
    # This will fail if imports are broken
    - python -c "import pkgutil; import sys; sys.exit(0)"
